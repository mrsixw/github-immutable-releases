name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check Bash syntax
        run: bash -n manage_immutable_releases.sh tests/helpers/gh tests/test_helper.bash

      - name: Run ShellCheck
        run: shellcheck manage_immutable_releases.sh tests/helpers/gh tests/test_helper.bash

  test:
    name: Bats
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Bats
        id: setup-bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # v4.0.0
        with:
          bats-version: 1.13.0
          support-install: false
          assert-install: false
          detik-install: false
          file-install: false
          github-token: ${{ github.token }}

      - name: Run Bats tests
        run: bats tests
